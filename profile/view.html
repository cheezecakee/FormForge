<ff-profile>
    <span>Profile</span>

    <div>
        <button class="editbtn">Edit</button>
        <button class="clearbtn">Clear</button>
        <button class="helpbtn">Help</button>
    </div>
</ff-profile>

<ff-view>
    <div id="profile-view">

        <template id="view-section-template">
            <div class="view-section">
                <div class="view-section-title"></div>
                <div class="view-section-content"></div>
            </div>
        </template>

        <template id="view-field-template">
            <div class="view-field">
                <span class="view-label"></span>
                <span class="view-value"></span>
            </div>
        </template>

        <template id="view-entry-template">
            <div class="view-entry"></div>
        </template>

    </div>
</ff-view>
